name: Validate Agent Contracts

on:
  push:
    paths:
      - 'agents/**'
      - 'hooks/agent-router.sh'
      - 'rules/agents.md'
      - 'rules/agent-handoff-contract.md'
      - 'rules/artifact-memory.md'
      - 'rules/mcp-agent-policy.md'
      - 'memories/**'
      - 'scripts/validate_agent_contracts.sh'
      - 'scripts/test_agent_router.sh'
      - 'scripts/validate_memory_layer.sh'
      - 'scripts/validate_dry_runs.sh'
      - 'scripts/test_failure_injections.sh'
      - 'scripts/generate_observability_report.sh'
      - '.github/workflows/validate-agents.yml'
  pull_request:
    paths:
      - 'agents/**'
      - 'hooks/agent-router.sh'
      - 'rules/agents.md'
      - 'rules/agent-handoff-contract.md'
      - 'rules/artifact-memory.md'
      - 'rules/mcp-agent-policy.md'
      - 'memories/**'
      - 'scripts/validate_agent_contracts.sh'
      - 'scripts/test_agent_router.sh'
      - 'scripts/validate_memory_layer.sh'
      - 'scripts/validate_dry_runs.sh'
      - 'scripts/test_failure_injections.sh'
      - 'scripts/generate_observability_report.sh'
      - '.github/workflows/validate-agents.yml'

jobs:
  validate-agent-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate agent contracts
        run: bash scripts/validate_agent_contracts.sh

      - name: Test agent router
        run: bash scripts/test_agent_router.sh

      - name: Validate memory layer
        run: bash scripts/validate_memory_layer.sh

      - name: Validate dry-runs
        run: bash scripts/validate_dry_runs.sh

      - name: Test failure injections
        run: bash scripts/test_failure_injections.sh

      - name: Generate observability report
        run: bash scripts/generate_observability_report.sh

      - name: Upload observability report
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-observability
          path: |
            memories/shared/observability/dry_run_observability_latest.md
            memories/shared/observability/dry_run_observability_latest.jsonl
